name: Fuzz

# Daily fuzz run for the cargo-fuzz harnesses under fuzz/. QOI is a
# single-pass linear codec whose decode + encode paths are specified
# entirely by the one-page qoiformat.org spec. The targets under fuzz/
# (decode, encode_roundtrip, chunk_walk, op_iter, op_write, trait_decode)
# each assert a panic-free / lossless contract derived from that spec;
# trait_decode additionally drives the framework-side Decoder trait
# (send_packet / receive_frame / receive_arena_frame). The reusable
# workflow auto-discovers every [[bin]] target and shares the 30-minute
# budget across them.

on:
  schedule:
    - cron: "37 6 * * *"   # daily 06:37 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      time_budget_seconds: 1800
    secrets: inherit
