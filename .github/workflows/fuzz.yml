name: Fuzz

# Daily fuzz run for the cargo-fuzz harnesses under fuzz/. QOI is a
# single-pass linear decoder with no external library oracle worth
# pulling in (and the clean-room wall bars the C reference `qoi.h`), so
# this is a decode-only panic-free harness: one target gets the whole
# 30-minute budget.

on:
  schedule:
    - cron: "37 6 * * *"   # daily 06:37 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      time_budget_seconds: 1800
    secrets: inherit
